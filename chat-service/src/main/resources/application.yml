spring:
  application:
    name: chat-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      "[hibernate.type.preferred_enum_jdbc_type]": VARCHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  cassandra:
    keyspace-name: ${CASSANDRA_KEYSPACE}
    contact-points: ${CASSANDRA_CONTACT_POINTS}
    port: ${CASSANDRA_PORT}
    local-datacenter: ${CASSANDRA_DATACENTER}
    schema-action: create_if_not_exists
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

server:
  port: ${CHAT_HTTP_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  environment: ${APP_ENV}
  internal-grpc-token: ${INTERNAL_GRPC_TOKEN}
  messaging-groups:
    max-members: ${MESSAGING_GROUP_MAX_MEMBERS}
    max-title-chars: ${MESSAGING_GROUP_MAX_TITLE_CHARS}
    max-description-chars: ${MESSAGING_GROUP_MAX_DESCRIPTION_CHARS}
  messages:
    max-chars: ${CHAT_MESSAGE_MAX_CHARS}
  chat-events:
    rabbit-enabled: ${CHAT_EVENTS_RABBIT_ENABLED}

grpc:
  server:
    port: ${CHAT_GRPC_PORT}
    security:
      enabled: ${GRPC_SERVER_SECURITY_ENABLED}
      client-auth: ${GRPC_SERVER_SECURITY_CLIENT_AUTH}
  client:
    GLOBAL:
      negotiationType: ${GRPC_CLIENT_NEGOTIATION_TYPE}
    user-service:
      address: ${USER_SERVICE_GRPC}
    auth-service:
      address: ${AUTH_SERVICE_GRPC}

chat:
  aes:
    # AES-256-GCM requires exactly 32 decoded bytes. No default — service
    # refuses to boot without one. Generate with: openssl rand -base64 32
    # If this leaks, every encrypted message in the DB is decryptable.
    key: ${CHAT_AES_KEY_BASE64}
