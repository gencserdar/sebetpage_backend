# Every value below is sourced from the environment. No defaults — Spring
# refuses to boot if any required key is missing, which is intentional.
# Use `.env.example` as a template for the required keys.

server:
  port: ${GATEWAY_PORT}

spring:
  application:
    name: api-gateway
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE}
      max-request-size: ${MAX_UPLOAD_SIZE}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      # Lettuce connection pool — keep a small pool so rate-limit Lua scripts
      # don't queue behind each other under burst traffic.
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

frontend:
  base-url: ${FRONTEND_BASE_URL}

app:
  environment: ${APP_ENV}
  allowed-origins: ${ALLOWED_ORIGINS}
  trust-proxy-headers: ${TRUST_PROXY_HEADERS}
  ws-ticket-ttl-seconds: ${WS_TICKET_TTL_SECONDS}
  internal-grpc-token: ${INTERNAL_GRPC_TOKEN}
  upload:
    storage-dir: ${UPLOAD_STORAGE_DIR}
  rate-limit:
    login:
      capacity: ${RATE_LIMIT_LOGIN_CAPACITY}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS}
    register:
      capacity: ${RATE_LIMIT_REGISTER_CAPACITY}
      window-seconds: ${RATE_LIMIT_REGISTER_WINDOW_SECONDS}
    forgot-password:
      capacity: ${RATE_LIMIT_FORGOT_PASSWORD_CAPACITY}
      window-seconds: ${RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS}
    request-email-change:
      capacity: ${RATE_LIMIT_REQUEST_EMAIL_CHANGE_CAPACITY}
      window-seconds: ${RATE_LIMIT_REQUEST_EMAIL_CHANGE_WINDOW_SECONDS}
    request-password-change:
      capacity: ${RATE_LIMIT_REQUEST_PASSWORD_CHANGE_CAPACITY}
      window-seconds: ${RATE_LIMIT_REQUEST_PASSWORD_CHANGE_WINDOW_SECONDS}
    activate:
      capacity: ${RATE_LIMIT_ACTIVATE_CAPACITY}
      window-seconds: ${RATE_LIMIT_ACTIVATE_WINDOW_SECONDS}
    reset-password:
      capacity: ${RATE_LIMIT_RESET_PASSWORD_CAPACITY}
      window-seconds: ${RATE_LIMIT_RESET_PASSWORD_WINDOW_SECONDS}
    messaging-group-write:
      # New name: RATE_LIMIT_MESSAGING_GROUP_* ; legacy: RATE_LIMIT_GROUP_* ; else defaults.
      capacity: ${RATE_LIMIT_MESSAGING_GROUP_WRITE_CAPACITY:${RATE_LIMIT_GROUP_WRITE_CAPACITY:30}}
      window-seconds: ${RATE_LIMIT_MESSAGING_GROUP_WRITE_WINDOW_SECONDS:${RATE_LIMIT_GROUP_WRITE_WINDOW_SECONDS:60}}
    messaging-group-photo:
      capacity: ${RATE_LIMIT_MESSAGING_GROUP_PHOTO_CAPACITY:${RATE_LIMIT_GROUP_PHOTO_CAPACITY:10}}
      window-seconds: ${RATE_LIMIT_MESSAGING_GROUP_PHOTO_WINDOW_SECONDS:${RATE_LIMIT_GROUP_PHOTO_WINDOW_SECONDS:300}}
    chat-send:
      capacity: ${RATE_LIMIT_CHAT_SEND_CAPACITY}
      window-seconds: ${RATE_LIMIT_CHAT_SEND_WINDOW_SECONDS}
    profile-settings-write:
      capacity: ${RATE_LIMIT_PROFILE_SETTINGS_WRITE_CAPACITY:30}
      window-seconds: ${RATE_LIMIT_PROFILE_SETTINGS_WRITE_WINDOW_SECONDS:60}
    profile-photo:
      capacity: ${RATE_LIMIT_PROFILE_PHOTO_CAPACITY:10}
      window-seconds: ${RATE_LIMIT_PROFILE_PHOTO_WINDOW_SECONDS:300}
    search:
      capacity: ${RATE_LIMIT_SEARCH_CAPACITY:60}
      window-seconds: ${RATE_LIMIT_SEARCH_WINDOW_SECONDS:60}
    friend-write:
      capacity: ${RATE_LIMIT_FRIEND_WRITE_CAPACITY:30}
      window-seconds: ${RATE_LIMIT_FRIEND_WRITE_WINDOW_SECONDS:60}
    block-write:
      capacity: ${RATE_LIMIT_BLOCK_WRITE_CAPACITY:20}
      window-seconds: ${RATE_LIMIT_BLOCK_WRITE_WINDOW_SECONDS:60}

# net.devh gRPC client endpoints. Hosts are env-driven so the same artifact
# runs locally (loopback), in docker-compose (service names), or in k8s (DNS).
grpc:
  client:
    GLOBAL:
      negotiationType: ${GRPC_CLIENT_NEGOTIATION_TYPE}
      # Send a keepalive ping every 30 s so the channel never goes idle between
      # proactive token refreshes (~45 s apart). Without this, the first request
      # after an idle window pays a full gRPC reconnect cost (~300 ms).
      keep-alive-time: 30s
      keep-alive-timeout: 5s
      keep-alive-without-calls: true
    auth-service:
      address: static://${AUTH_GRPC_HOST}:${AUTH_GRPC_PORT}
      keep-alive-time: 30s
      keep-alive-timeout: 5s
      keep-alive-without-calls: true
    user-service:
      address: static://${USER_GRPC_HOST}:${USER_GRPC_PORT}
    community-service:
      address: static://${COMMUNITY_GRPC_HOST}:${COMMUNITY_GRPC_PORT}
    chat-service:
      address: static://${CHAT_GRPC_HOST}:${CHAT_GRPC_PORT}

# Don't leak DB / disk paths via default actuator surface. Health is
# sufficient for an external probe.
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.serdar.gateway: INFO
    net.devh.boot.grpc: INFO
