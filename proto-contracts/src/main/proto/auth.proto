syntax = "proto3";

package com.serdar.proto.auth;
option java_multiple_files = true;
option java_package = "com.serdar.proto.auth";

import "common.proto";

// Auth-service owns credentials: id, email, nickname, password, role, activation,
// reset code. Refresh tokens are tracked in the `sessions` table (one row per
// active device/browser), keyed by session_id which is embedded in the JWTs.
service AuthService {
  rpc Register         (RegisterRequest)        returns (RegisterResponse);
  // Compensation: delete unactivated credential when profile creation fails.
  rpc AbortRegistration (com.serdar.proto.common.IdRequest) returns (com.serdar.proto.common.Empty);
  rpc Login            (LoginRequest)           returns (AuthResponse);
  rpc Refresh          (RefreshRequest)         returns (AuthResponse);

  // Logout this specific session (single device).
  rpc Logout           (LogoutRequest)          returns (com.serdar.proto.common.Empty);
  // Logout all sessions for a user (all devices).
  rpc LogoutAll        (LogoutAllRequest)       returns (com.serdar.proto.common.Empty);
  rpc ListSessions     (ListSessionsRequest)    returns (SessionList);
  rpc RevokeSession    (RevokeSessionRequest)   returns (com.serdar.proto.common.Empty);

  rpc Activate         (ActivateRequest)        returns (com.serdar.proto.common.BoolResponse);
  // Re-issue activation link for unactivated accounts (silent no-op otherwise).
  rpc ResendActivation (ForgotPasswordRequest)  returns (com.serdar.proto.common.Empty);
  rpc ForgotPassword   (ForgotPasswordRequest)  returns (com.serdar.proto.common.Empty);
  rpc ResetPassword    (ResetPasswordRequest)   returns (com.serdar.proto.common.BoolResponse);
  rpc ChangePassword   (ChangePasswordRequest)  returns (com.serdar.proto.common.BoolResponse);

  // Token validation (called by every gateway request + WS handshake).
  rpc ValidateToken    (ValidateTokenRequest)   returns (ValidateTokenResponse);

  // Lookup RPCs — used by user-service and gateway.
  rpc GetCredentialsById       (com.serdar.proto.common.IdRequest)     returns (Credentials);
  rpc GetCredentialsByEmail    (com.serdar.proto.common.StringRequest) returns (Credentials);
  rpc GetCredentialsByNickname (com.serdar.proto.common.StringRequest) returns (Credentials);

  // Uniqueness checks (user-service calls these when changing email/nickname).
  rpc IsEmailTaken     (com.serdar.proto.common.StringRequest) returns (com.serdar.proto.common.BoolResponse);
  rpc IsNicknameTaken  (com.serdar.proto.common.StringRequest) returns (com.serdar.proto.common.BoolResponse);

  // Atomic credential mutations initiated by user-service after its own checks.
  rpc UpdateEmail      (UpdateEmailRequest)     returns (com.serdar.proto.common.BoolResponse);
  rpc UpdateNickname   (UpdateNicknameRequest)  returns (com.serdar.proto.common.BoolResponse);

  // Two-step email/password change with email-delivered 6-digit codes.
  rpc RequestEmailChange    (RequestEmailChangeRequest)    returns (com.serdar.proto.common.Empty);
  rpc ConfirmEmailChange    (ConfirmCodeRequest)           returns (ConfirmEmailChangeResponse);
  rpc RequestPasswordChange (RequestPasswordChangeRequest) returns (com.serdar.proto.common.Empty);
  rpc ConfirmPasswordChange (ConfirmCodeRequest)           returns (com.serdar.proto.common.BoolResponse);

  // Account freeze — user-initiated hibernation; revokes all sessions on freeze.
  rpc FreezeAccount   (com.serdar.proto.common.IdRequest) returns (com.serdar.proto.common.Empty);
  rpc UnfreezeAccount (com.serdar.proto.common.IdRequest) returns (com.serdar.proto.common.Empty);
  // Permanent account deletion — removes credentials and active sessions.
  rpc DeleteAccount   (com.serdar.proto.common.IdRequest) returns (com.serdar.proto.common.Empty);
}

enum Role {
  ROLE_UNSPECIFIED = 0;
  USER = 1;
  ADMIN = 2;
}

message Credentials {
  int64  id = 1;
  string email = 2;
  string nickname = 3;
  Role   role = 4;
  bool   activated = 5;
  bool   frozen = 6;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string nickname = 3;
  string name = 4;
  string surname = 5;
}

message RegisterResponse {
  int64  user_id = 1;
  string email = 2;
  string nickname = 3;
  string activation_code = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  bool   remember_me = 3;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64  user_id = 3;
  string email = 4;
  string nickname = 5;
  Role   role = 6;
  int32  refresh_cookie_age_seconds = 7;
  bool   frozen = 8;
}

message RefreshRequest {
  string refresh_token = 1;
}

// Invalidate a single session.
// Primary path  : session_id from the "sid" claim in the access token.
// Fallback path : refresh_token from the HttpOnly cookie — used when the
//                 access token has already expired at the time of logout.
// The service uses session_id if non-zero, otherwise falls back to the
// refresh_token hash. At least one field must be present.
message LogoutRequest {
  int64  session_id    = 1;
  string refresh_token = 2;
}

// Invalidate every session owned by a user — "logout from all devices".
message LogoutAllRequest {
  int64 user_id = 1;
}

message ListSessionsRequest {
  int64 user_id = 1;
  int64 current_session_id = 2;
}

message SessionInfo {
  int64 id = 1;
  int64 created_at_millis = 2;
  int64 expires_at_millis = 3;
  bool remember_me = 4;
  bool current = 5;
}

message SessionList {
  repeated SessionInfo sessions = 1;
}

message RevokeSessionRequest {
  int64 user_id = 1;
  int64 session_id = 2;
}

message ActivateRequest {
  string activation_code = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string reset_code = 1;
  string new_password = 2;
}

message ChangePasswordRequest {
  int64  user_id = 1;
  string current_password = 2;
  string new_password = 3;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool   valid = 1;
  int64  user_id = 2;
  string email = 3;
  string nickname = 4;
  Role   role = 5;
  int64  session_id = 6; // active session — used by gateway for targeted logout
  bool   frozen = 7;
}

message UpdateEmailRequest {
  int64  user_id = 1;
  string new_email = 2;
}

message UpdateNicknameRequest {
  int64  user_id = 1;
  string new_nickname = 2;
}

message RequestEmailChangeRequest {
  int64  user_id = 1;
  string new_email = 2;
}

message RequestPasswordChangeRequest {
  int64  user_id = 1;
  string current_password = 2;
  string new_password = 3;
}

message ConfirmCodeRequest {
  int64  user_id = 1;
  string code = 2;
}

message ConfirmEmailChangeResponse {
  bool   ok = 1;
  string new_email = 2;
}
