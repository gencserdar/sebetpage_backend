syntax = "proto3";

package com.serdar.proto.group;
option java_multiple_files = true;
option java_package = "com.serdar.proto.group";

import "common.proto";

service GroupService {
  rpc CreateGroup     (CreateGroupRequest)    returns (Group);
  rpc Invite          (InviteRequest)         returns (com.serdar.proto.common.Empty);
  rpc RespondToInvite (RespondInviteRequest)  returns (com.serdar.proto.common.Empty);
  rpc MyGroups        (com.serdar.proto.common.IdRequest) returns (GroupList);
  rpc SearchGroups    (SearchGroupsRequest)   returns (GroupList);
  rpc IsMember        (MembershipRequest)     returns (com.serdar.proto.common.BoolResponse);
}

enum GroupRole {
  GROUP_ROLE_UNSPECIFIED = 0;
  MEMBER = 1;
  ADMIN  = 2;
  PENDING = 3;
}

message Group {
  int64  id = 1;
  string name = 2;
  string description = 3;
  bool   is_private = 4;
  int64  created_by = 5;
  int64  created_at_millis = 6;
  GroupRole my_role = 7;
}

message GroupList { repeated Group groups = 1; }

message CreateGroupRequest {
  int64  creator_id = 1;
  string name = 2;
  string description = 3;
}

message InviteRequest {
  int64 group_id = 1;
  int64 inviter_id = 2;
  int64 to_user_id = 3;
}

message RespondInviteRequest {
  int64 invite_id = 1;
  int64 responder_id = 2;
  bool  accept = 3;
}

message MembershipRequest {
  int64 group_id = 1;
  int64 user_id = 2;
}

message SearchGroupsRequest {
  string keyword = 1;
}
