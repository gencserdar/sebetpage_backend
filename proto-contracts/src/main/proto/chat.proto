syntax = "proto3";

package com.serdar.proto.chat;
option java_multiple_files = true;
option java_package = "com.serdar.proto.chat";

import "common.proto";

service ChatService {
  rpc GetOrCreateDirect      (GetOrCreateDirectRequest)      returns (Conversation);
  rpc SendMessage            (SendMessageRequest)            returns (ChatMessage);
  rpc GetPage                (GetPageRequest)                returns (MessagePage);
  rpc GetLatest              (GetLatestRequest)              returns (MessageList);
  rpc MarkRead               (MarkReadRequest)               returns (MarkReadResponse);
  rpc GetReadState           (ReadStateRequest)              returns (ReadStateResponse);
  rpc GetUnreadCounts        (com.serdar.proto.common.IdRequest) returns (UnreadCountsResponse);
  rpc MyConversations        (com.serdar.proto.common.IdRequest) returns (ConversationList);

  // Private messaging-group chat (FriendsPanel). Post communities live in community-service.
  rpc CreateMessagingGroup   (CreateMessagingGroupRequest)   returns (Conversation);
  rpc AddMessagingGroupMember(AddMessagingGroupMemberRequest) returns (Conversation);
  rpc RemoveMessagingGroupMember(RemoveMessagingGroupMemberRequest) returns (MessagingGroupDetail);
  rpc GetMessagingGroupDetail(MessagingGroupDetailRequest)    returns (MessagingGroupDetail);
  rpc UpdateMessagingGroup   (UpdateMessagingGroupRequest)    returns (MessagingGroupDetail);
  rpc UpdateMessagingGroupParticipant(UpdateMessagingGroupParticipantRequest) returns (MessagingGroupDetail);
  rpc ExitMessagingGroup     (MessagingGroupActionRequest)    returns (com.serdar.proto.common.Empty);
  rpc DeleteMessagingGroup   (MessagingGroupActionRequest)    returns (com.serdar.proto.common.Empty);

  // Server-stream for WebSocket bridging: gateway subscribes per user and relays
  // to its STOMP clients.
  rpc SubscribeEvents        (com.serdar.proto.common.IdRequest) returns (stream ChatEvent);
  // Fresh friend-presence snapshot (e.g. after a new friendship is created).
  rpc GetPresenceSnapshot    (com.serdar.proto.common.IdRequest) returns (ChatEvent);
}

enum ConversationType {
  CONVERSATION_TYPE_UNSPECIFIED = 0;
  DIRECT = 1;
  reserved 2; // was GROUP — removed; post communities use community-service.
  // Private messaging groups: created via the + button in a direct chat.
  MESSAGING_GROUP = 3;
}

message Conversation {
  int64  id = 1;
  ConversationType type = 2;
  int64  user_a_id = 3;
  int64  user_b_id = 4;
  string title = 5;
  int64  created_at_millis = 6;
  string description = 7;
  string image_url = 8;
  int64  created_by_id = 9;
}

message ConversationList { repeated Conversation conversations = 1; }

message GetOrCreateDirectRequest {
  int64 user_a_id = 1;
  int64 user_b_id = 2;
}

message SendMessageRequest {
  int64  conversation_id = 1;
  int64  sender_id = 2;
  string plaintext = 3;
}

message ChatMessage {
  int64  id = 1;
  int64  conversation_id = 2;
  int64  sender_id = 3;
  string content = 4; // plaintext — service decrypts before returning
  int64  created_at_millis = 5;
}

message MessageList { repeated ChatMessage messages = 1; }

message GetPageRequest {
  int64 conversation_id = 1;
  int64 caller_id = 2;
  int32 page = 3;
  int32 size = 4;
}

message MessagePage {
  repeated ChatMessage messages = 1; // DESC order (newest first)
  int32 page = 2;
  int32 size = 3;
  int64 total = 4;
}

message GetLatestRequest {
  int64 conversation_id = 1;
  int64 caller_id = 2;
  int32 limit = 3;
}

message MarkReadRequest {
  int64 conversation_id = 1;
  int64 reader_id = 2;
}

message MarkReadResponse {
  int64 conversation_id = 1;
  int32 unread_count = 2;
  int32 total_unread_count = 3;
  int64 last_read_at_millis = 4;
}

message ReadStateRequest {
  int64 conversation_id = 1;
  int64 caller_id = 2;
}

message ReadStateResponse {
  int64 my_last_read_at_millis = 1;
  int64 friend_last_read_at_millis = 2;
  int64 seen_my_message_id = 3;
  int64 friend_user_id = 4;
  int64 my_user_id = 5;
}

message UnreadCountsResponse {
  int32 total_count = 1;
  map<int64, int32> per_conversation = 2;
}

message ChatEvent {
  string type = 1; // MESSAGE | READ | PRESENCE_UPDATE | PRESENCE_SNAPSHOT | UNREAD_COUNT_UPDATE
  int64  conversation_id = 2;
  ChatMessage message = 3;
  int64  reader_id = 4;
  int64  last_read_at_millis = 5;
  int64  subject_user_id = 6;
  bool   online = 7;
  int32  unread_count = 8;
  int32  total_unread_count = 9;
  repeated PresenceEntry presence_snapshot = 10;
}

message PresenceEntry {
  int64 user_id = 1;
  bool  online = 2;
}

// -- Messaging-group messages -----------------------------------------------

message CreateMessagingGroupRequest {
  int64          creator_id  = 1;
  repeated int64 member_ids  = 2; // additional members (not including creator)
  string         name        = 3; // optional display name
}

message AddMessagingGroupMemberRequest {
  int64 conversation_id = 1;
  int64 requester_id    = 2; // must be an existing member
  int64 new_user_id     = 3;
}

message RemoveMessagingGroupMemberRequest {
  int64 conversation_id = 1;
  int64 requester_id = 2;
  int64 target_user_id = 3;
}

message MessagingGroupDetailRequest {
  int64 conversation_id = 1;
  int64 requester_id = 2;
}

message MessagingGroupPermissionSet {
  bool can_change_photo = 1;
  bool can_change_description = 2;
  bool can_change_name = 3;
  bool can_remove_members = 4;
  bool can_add_members = 5;
}

message MessagingGroupParticipant {
  int64 user_id = 1;
  string role = 2;
  bool muted = 3;
  MessagingGroupPermissionSet permissions = 4;
  // True when the requester blocked this participant (shown in blocked list).
  bool blocked_by_me = 5;
  // True when this participant blocked the requester (shown as offline).
  bool blocks_me = 6;
}

message MessagingGroupDetail {
  Conversation conversation = 1;
  repeated MessagingGroupParticipant participants = 2;
  MessagingGroupParticipant me = 3;
  repeated MessagingGroupParticipant known_participants = 4;
}

message UpdateMessagingGroupRequest {
  int64 conversation_id = 1;
  int64 requester_id = 2;
  bool update_title = 3;
  string title = 4;
  bool update_description = 5;
  string description = 6;
  bool update_image_url = 7;
  string image_url = 8;
}

message UpdateMessagingGroupParticipantRequest {
  int64 conversation_id = 1;
  int64 requester_id = 2;
  int64 target_user_id = 3;
  bool update_muted = 4;
  bool muted = 5;
  bool update_permissions = 6;
  MessagingGroupPermissionSet permissions = 7;
}

message MessagingGroupActionRequest {
  int64 conversation_id = 1;
  int64 requester_id = 2;
}
