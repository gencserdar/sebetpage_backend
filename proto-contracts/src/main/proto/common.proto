syntax = "proto3";

package com.serdar.proto.common;
option java_multiple_files = true;
option java_package = "com.serdar.proto.common";

message Empty {}

message IdRequest {
  int64 id = 1;
}

message IdList {
  repeated int64 ids = 1;
}

message StringRequest {
  string value = 1;
}

message BoolResponse {
  bool value = 1;
}

message Timestamp {
  int64 epoch_millis = 1;
}
