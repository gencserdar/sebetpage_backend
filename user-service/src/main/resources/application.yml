spring:
  application:
    name: user-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      "[hibernate.type.preferred_enum_jdbc_type]": VARCHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE}
      max-request-size: ${MAX_UPLOAD_SIZE}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

server:
  port: ${USER_HTTP_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  environment: ${APP_ENV}
  internal-grpc-token: ${INTERNAL_GRPC_TOKEN}
  upload:
    storage-dir: ${UPLOAD_STORAGE_DIR}
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL}
  opensearch:
    host: ${OPENSEARCH_HOST}
    port: ${OPENSEARCH_PORT}
    scheme: ${OPENSEARCH_SCHEME:http}
    username: ${OPENSEARCH_USERNAME:}
    password: ${OPENSEARCH_PASSWORD:}

grpc:
  server:
    port: ${USER_GRPC_PORT}
    security:
      enabled: ${GRPC_SERVER_SECURITY_ENABLED}
      client-auth: ${GRPC_SERVER_SECURITY_CLIENT_AUTH}
  client:
    GLOBAL:
      negotiationType: ${GRPC_CLIENT_NEGOTIATION_TYPE}
    auth-service:
      address: ${AUTH_SERVICE_GRPC}
