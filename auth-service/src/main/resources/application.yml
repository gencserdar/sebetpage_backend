# Every value below is sourced from the environment. No defaults — Spring
# refuses to boot if a key is missing. Use `.env.example` as the template.

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.MySQL8Dialect
    properties:
      "[hibernate.type.preferred_enum_jdbc_type]": VARCHAR
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
  # SMTP creds live in mail-worker — auth-service only publishes mail jobs.
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

server:
  # HTTP port only used by Spring actuator; all domain traffic is gRPC.
  port: ${AUTH_HTTP_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  environment: ${APP_ENV}
  internal-grpc-token: ${INTERNAL_GRPC_TOKEN}
  activation-code-ttl-minutes: ${ACTIVATION_CODE_TTL_MINUTES}
  reset-code-ttl-minutes: ${RESET_CODE_TTL_MINUTES}
  reset-code-max-attempts: ${RESET_CODE_MAX_ATTEMPTS}
  account-change-code-ttl-minutes: ${ACCOUNT_CHANGE_CODE_TTL_MINUTES}
  account-change-code-max-attempts: ${ACCOUNT_CHANGE_CODE_MAX_ATTEMPTS}

grpc:
  server:
    port: ${AUTH_GRPC_PORT}
    enable-keep-alive: true
    permit-keep-alive-without-calls: true
    permit-keep-alive-time: 20s
    security:
      enabled: ${GRPC_SERVER_SECURITY_ENABLED}
      client-auth: ${GRPC_SERVER_SECURITY_CLIENT_AUTH}
  client:
    GLOBAL:
      negotiationType: ${GRPC_CLIENT_NEGOTIATION_TYPE}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

refresh:
  # HMAC-SHA-256 key used to hash refresh tokens at rest. Base64-encoded
  # 32+ random bytes. Generate: openssl rand -base64 32
  # If this leaks alongside the DB, attackers can verify-but-not-forge
  # refresh tokens — i.e., they could use stolen JWT cookies. Treat as
  # secret. Rotating it logs everyone out (forces re-login on next refresh).
  hmac-key: ${REFRESH_TOKEN_HMAC_KEY}
  expiration:
    default:  ${REFRESH_EXPIRATION_DEFAULT}
    remember: ${REFRESH_EXPIRATION_REMEMBER}

# Used to build links inside emails (activation, password reset). Must be
# host-reachable URLs — NOT internal docker service names — because users
# click them from their browser.
frontend:
  base-url: ${FRONTEND_BASE_URL}
gateway:
  base-url: ${GATEWAY_BASE_URL}
